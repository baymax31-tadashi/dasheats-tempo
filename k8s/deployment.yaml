# =============================================================================
# Kubernetes Deployment for Food Ordering Application
# =============================================================================
# Manages the deployment of the Food Order application pods
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: food-order-app
  namespace: food-order
  labels:
    app: food-order
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: food-order
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: food-order
        version: v1
    spec:
      containers:
        - name: food-order-app
          image: food-order-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: food-order-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
