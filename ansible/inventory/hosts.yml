# =============================================================================
# Ansible Inventory for Food Ordering Application
# =============================================================================
# Define your target hosts here
# =============================================================================

all:
  children:
    # -------------------------------------------------------------------------
    # Application Servers
    # -------------------------------------------------------------------------
    app_servers:
      hosts:
        app1:
          ansible_host: 192.168.1.10
          ansible_user: deploy
        app2:
          ansible_host: 192.168.1.11
          ansible_user: deploy
      vars:
        app_port: 3000
        node_version: "20"

    # -------------------------------------------------------------------------
    # Kubernetes Cluster Nodes
    # -------------------------------------------------------------------------
    k8s_masters:
      hosts:
        k8s-master1:
          ansible_host: 192.168.1.20
          ansible_user: k8sadmin
      vars:
        k8s_role: master

    k8s_workers:
      hosts:
        k8s-worker1:
          ansible_host: 192.168.1.21
          ansible_user: k8sadmin
        k8s-worker2:
          ansible_host: 192.168.1.22
          ansible_user: k8sadmin
      vars:
        k8s_role: worker

    # -------------------------------------------------------------------------
    # CI/CD Servers
    # -------------------------------------------------------------------------
    jenkins:
      hosts:
        jenkins-master:
          ansible_host: 192.168.1.30
          ansible_user: jenkins

  # ---------------------------------------------------------------------------
  # Global Variables
  # ---------------------------------------------------------------------------
  vars:
    ansible_python_interpreter: /usr/bin/python3
    ansible_ssh_private_key_file: ~/.ssh/id_rsa
    app_name: food-order-app
    docker_registry: your-registry.com
