# =============================================================================
# Ansible Playbook: Setup Kubernetes Cluster
# =============================================================================
# This playbook sets up a Kubernetes cluster for the Food Order application
# 
# Usage:
#   ansible-playbook -i inventory/hosts.yml playbooks/setup-k8s.yml
# =============================================================================

---
- name: Setup Kubernetes Prerequisites
  hosts: k8s_masters:k8s_workers
  become: yes
  gather_facts: yes

  tasks:
    # -------------------------------------------------------------------------
    # System Configuration
    # -------------------------------------------------------------------------
    - name: Disable swap
      command: swapoff -a
      when: ansible_swaptotal_mb > 0
      tags: system

    - name: Remove swap from fstab
      lineinfile:
        path: /etc/fstab
        regexp: '.*swap.*'
        state: absent
      tags: system

    - name: Load required kernel modules
      modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter
      tags: system

    - name: Configure sysctl for Kubernetes
      sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        state: present
        reload: yes
      loop:
        - { key: 'net.bridge.bridge-nf-call-iptables', value: '1' }
        - { key: 'net.bridge.bridge-nf-call-ip6tables', value: '1' }
        - { key: 'net.ipv4.ip_forward', value: '1' }
      tags: system

    # -------------------------------------------------------------------------
    # Container Runtime (containerd)
    # -------------------------------------------------------------------------
    - name: Install containerd
      apt:
        name: containerd
        state: present
        update_cache: yes
      tags: containerd

    - name: Create containerd config directory
      file:
        path: /etc/containerd
        state: directory
      tags: containerd

    - name: Configure containerd
      shell: containerd config default > /etc/containerd/config.toml
      args:
        creates: /etc/containerd/config.toml
      tags: containerd

    - name: Enable SystemdCgroup in containerd
      lineinfile:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup = false'
        line: '            SystemdCgroup = true'
      notify: Restart containerd
      tags: containerd

    - name: Start and enable containerd
      systemd:
        name: containerd
        state: started
        enabled: yes
      tags: containerd

    # -------------------------------------------------------------------------
    # Kubernetes Installation
    # -------------------------------------------------------------------------
    - name: Add Kubernetes GPG key
      apt_key:
        url: https://packages.cloud.google.com/apt/doc/apt-key.gpg
        state: present
      tags: kubernetes

    - name: Add Kubernetes repository
      apt_repository:
        repo: "deb https://apt.kubernetes.io/ kubernetes-xenial main"
        state: present
        filename: kubernetes
      tags: kubernetes

    - name: Install Kubernetes components
      apt:
        name:
          - kubelet
          - kubeadm
          - kubectl
        state: present
        update_cache: yes
      tags: kubernetes

    - name: Hold Kubernetes packages
      dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubelet
        - kubeadm
        - kubectl
      tags: kubernetes

  handlers:
    - name: Restart containerd
      systemd:
        name: containerd
        state: restarted

# =============================================================================
# Initialize Kubernetes Master
# =============================================================================
- name: Initialize Kubernetes Master
  hosts: k8s_masters
  become: yes
  gather_facts: yes

  tasks:
    - name: Check if cluster is already initialized
      stat:
        path: /etc/kubernetes/admin.conf
      register: kubeadm_init
      tags: master

    - name: Initialize Kubernetes cluster
      command: >
        kubeadm init
        --pod-network-cidr=10.244.0.0/16
        --apiserver-advertise-address={{ ansible_default_ipv4.address }}
      when: not kubeadm_init.stat.exists
      register: kubeadm_output
      tags: master

    - name: Create .kube directory
      file:
        path: "/home/{{ ansible_user }}/.kube"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'
      tags: master

    - name: Copy admin.conf to user's kube config
      copy:
        src: /etc/kubernetes/admin.conf
        dest: "/home/{{ ansible_user }}/.kube/config"
        remote_src: yes
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0644'
      tags: master

    - name: Install Flannel network plugin
      become_user: "{{ ansible_user }}"
      command: kubectl apply -f https://raw.githubusercontent.com/flannel-io/flannel/master/Documentation/kube-flannel.yml
      when: not kubeadm_init.stat.exists
      tags: master

    - name: Generate join command
      command: kubeadm token create --print-join-command
      register: join_command
      changed_when: false
      tags: master

    - name: Store join command
      set_fact:
        kubeadm_join_command: "{{ join_command.stdout }}"
      tags: master

# =============================================================================
# Join Worker Nodes
# =============================================================================
- name: Join Worker Nodes to Cluster
  hosts: k8s_workers
  become: yes
  gather_facts: yes

  tasks:
    - name: Check if node is already joined
      stat:
        path: /etc/kubernetes/kubelet.conf
      register: kubelet_conf
      tags: worker

    - name: Join cluster
      command: "{{ hostvars[groups['k8s_masters'][0]]['kubeadm_join_command'] }}"
      when: not kubelet_conf.stat.exists
      tags: worker

# =============================================================================
# Deploy Application to Kubernetes
# =============================================================================
- name: Deploy Food Order Application
  hosts: k8s_masters
  become: yes
  become_user: "{{ ansible_user }}"
  gather_facts: no

  vars:
    k8s_namespace: food-order
    app_name: food-order-app

  tasks:
    - name: Copy Kubernetes manifests
      copy:
        src: "{{ playbook_dir }}/../../k8s/"
        dest: "/tmp/k8s-manifests/"
      tags: deploy

    - name: Apply Kubernetes manifests
      command: kubectl apply -k /tmp/k8s-manifests/
      tags: deploy

    - name: Wait for deployment to be ready
      command: >
        kubectl rollout status deployment/{{ app_name }}
        -n {{ k8s_namespace }}
        --timeout=300s
      tags: deploy

    - name: Display deployment status
      command: kubectl get all -n {{ k8s_namespace }}
      register: k8s_status
      tags: deploy

    - name: Show deployment status
      debug:
        var: k8s_status.stdout_lines
      tags: deploy
