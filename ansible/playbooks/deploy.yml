# =============================================================================
# Ansible Playbook: Deploy Food Ordering Application
# =============================================================================
# This playbook deploys the Food Order application to target servers
# 
# Usage:
#   ansible-playbook -i inventory/hosts.yml playbooks/deploy.yml
#   ansible-playbook -i inventory/hosts.yml playbooks/deploy.yml --tags "docker"
# =============================================================================

---
- name: Deploy Food Ordering Application
  hosts: app_servers
  become: yes
  gather_facts: yes

  vars:
    app_name: food-order-app
    app_port: 3000
    docker_image: "{{ docker_registry }}/{{ app_name }}"
    docker_tag: "{{ app_version | default('latest') }}"
    container_name: "{{ app_name }}"

  # ---------------------------------------------------------------------------
  # Pre-tasks: Validation and Preparation
  # ---------------------------------------------------------------------------
  pre_tasks:
    - name: Validate required variables
      assert:
        that:
          - docker_registry is defined
          - app_name is defined
        fail_msg: "Required variables are not defined"
      tags: always

    - name: Update apt cache (Debian/Ubuntu)
      apt:
        update_cache: yes
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"
      tags: system

  # ---------------------------------------------------------------------------
  # Tasks
  # ---------------------------------------------------------------------------
  tasks:
    # -------------------------------------------------------------------------
    # System Setup
    # -------------------------------------------------------------------------
    - name: Install required system packages
      package:
        name:
          - curl
          - wget
          - ca-certificates
          - gnupg
          - lsb-release
        state: present
      tags: system

    # -------------------------------------------------------------------------
    # Docker Installation
    # -------------------------------------------------------------------------
    - name: Check if Docker is installed
      command: docker --version
      register: docker_installed
      ignore_errors: yes
      changed_when: false
      tags: docker

    - name: Install Docker (if not present)
      block:
        - name: Add Docker GPG key
          apt_key:
            url: https://download.docker.com/linux/ubuntu/gpg
            state: present

        - name: Add Docker repository
          apt_repository:
            repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
            state: present

        - name: Install Docker CE
          apt:
            name:
              - docker-ce
              - docker-ce-cli
              - containerd.io
            state: present
            update_cache: yes

        - name: Start and enable Docker service
          systemd:
            name: docker
            state: started
            enabled: yes
      when: docker_installed.rc != 0
      tags: docker

    - name: Add deploy user to docker group
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes
      tags: docker

    # -------------------------------------------------------------------------
    # Application Deployment
    # -------------------------------------------------------------------------
    - name: Login to Docker registry
      docker_login:
        registry: "{{ docker_registry }}"
        username: "{{ docker_username }}"
        password: "{{ docker_password }}"
      when: docker_username is defined and docker_password is defined
      no_log: yes
      tags: deploy

    - name: Pull latest application image
      docker_image:
        name: "{{ docker_image }}"
        tag: "{{ docker_tag }}"
        source: pull
        force_source: yes
      tags: deploy

    - name: Stop existing container (if running)
      docker_container:
        name: "{{ container_name }}"
        state: stopped
      ignore_errors: yes
      tags: deploy

    - name: Remove existing container
      docker_container:
        name: "{{ container_name }}"
        state: absent
      ignore_errors: yes
      tags: deploy

    - name: Create application directory
      file:
        path: "/opt/{{ app_name }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'
      tags: deploy

    - name: Start application container
      docker_container:
        name: "{{ container_name }}"
        image: "{{ docker_image }}:{{ docker_tag }}"
        state: started
        restart_policy: unless-stopped
        ports:
          - "{{ app_port }}:3000"
        env:
          NODE_ENV: production
          HOSTNAME: "0.0.0.0"
        healthcheck:
          test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
          interval: 30s
          timeout: 10s
          retries: 3
          start_period: 40s
      tags: deploy

    # -------------------------------------------------------------------------
    # Health Check
    # -------------------------------------------------------------------------
    - name: Wait for application to be healthy
      uri:
        url: "http://localhost:{{ app_port }}/api/health"
        method: GET
        status_code: 200
      register: health_check
      until: health_check.status == 200
      retries: 10
      delay: 5
      tags: deploy

    - name: Display deployment status
      debug:
        msg: |
          Application deployed successfully!
          Container: {{ container_name }}
          Image: {{ docker_image }}:{{ docker_tag }}
          Port: {{ app_port }}
          Health: {{ health_check.json.status | default('healthy') }}
      tags: deploy

  # ---------------------------------------------------------------------------
  # Handlers
  # ---------------------------------------------------------------------------
  handlers:
    - name: Restart Docker
      systemd:
        name: docker
        state: restarted

    - name: Restart application
      docker_container:
        name: "{{ container_name }}"
        state: started
        restart: yes
