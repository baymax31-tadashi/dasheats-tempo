# =============================================================================
# Docker Compose for Food Ordering Application
# =============================================================================
# Usage:
#   Development:  docker-compose up
#   Production:   docker-compose -f docker-compose.yml -f docker-compose.prod.yml up
# =============================================================================

version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # Food Ordering Application
  # ---------------------------------------------------------------------------
  food-order-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: food-order-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - food-order-network

# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------
networks:
  food-order-network:
    driver: bridge
    name: food-order-network
